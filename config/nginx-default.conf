server {
    listen 80 default_server;
    server_name 43.128.119.244;
    root /var/www/html/steel-platform;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /stock-manager {
        alias /var/www/html/stock-manager/;
        etag off; if_modified_since off;
        try_files $uri $uri/ /stock-manager/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location /api/v1/management/ {
        proxy_set_header X-API-Key "90a275cbcc004fd5";
        proxy_pass http://127.0.0.1:8887/api/v1/management/;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
    location /api/v1/trend/ {
        proxy_set_header X-API-Key "90a275cbcc004fd5";
        proxy_pass http://127.0.0.1:8888/api/v1/trend/;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }
    location /api/v1/signal/ {
        proxy_set_header X-API-Key "90a275cbcc004fd5";
        proxy_pass http://127.0.0.1:8889/api/v1/signal/;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }
    location /health {
        proxy_pass http://127.0.0.1:8890/health;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/xiyi/ {
        proxy_pass http://127.0.0.1:8890/api/v1/xiyi/;
        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key "90a275cbcc004fd5";
        proxy_read_timeout 300s;
    }
}
